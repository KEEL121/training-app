<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; worker-src 'self' blob:; connect-src 'self'; img-src 'self' blob: data:; style-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'">
  <meta name="theme-color" content="#0D1117">
  <meta name="description" content="筋トレ・体組成・有酸素運動を記録する個人用トレーニング管理アプリ。データは端末内にのみ保存されます。">
  <title>トレ管 - トレーニング管理</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon-192.png">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/layout.css">
  <script type="module" src="./js/app.js"></script>
</head>
<body>
  <div id="app">
    <nav id="mainnav" aria-label="メインナビゲーション">
      <div class="nav-brand">トレ管</div>
      <div class="nav-links">
        <a href="#/" data-nav="home"><span class="nav-icon" data-icon="home"></span><span class="nav-label">ホーム</span></a>
        <a href="#/history" data-nav="history"><span class="nav-icon" data-icon="history"></span><span class="nav-label">履歴</span></a>
        <a href="#/charts" data-nav="charts"><span class="nav-icon" data-icon="chart"></span><span class="nav-label">グラフ</span></a>
        <a href="#/settings" data-nav="settings"><span class="nav-icon" data-icon="settings"></span><span class="nav-label">設定</span></a>
      </div>
    </nav>
    <main id="view" tabindex="-1"></main>
    <button id="fab" aria-label="記録を追加" hidden><span data-icon="plus"></span></button>
  </div>
  <div id="toast-root" aria-live="polite"></div>
  <div id="modal-root"></div>
</body>
</html>
